name: Deploy - Production

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/BusinessAssistant.Api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            export DB_CONNECTION_STRING="${{ secrets.PROD_DB_CONNECTION_STRING }}"
            export REDIS_CONNECTION_STRING="${{ secrets.PROD_REDIS_CONNECTION_STRING }}"
            export REDIS_PASSWORD="${{ secrets.PROD_REDIS_PASSWORD }}"
            export POSTGRES_USER="${{ secrets.PROD_POSTGRES_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.PROD_POSTGRES_PASSWORD }}"
            export POSTGRES_DB="${{ secrets.PROD_POSTGRES_DB }}"
            export JWT_KEY="${{ secrets.PROD_JWT_KEY }}"
            export JWT_ISSUER="${{ secrets.PROD_JWT_ISSUER }}"
            export JWT_AUDIENCE="${{ secrets.PROD_JWT_AUDIENCE }}"
            export JWT_EXPIRATION_HOURS="${{ secrets.PROD_JWT_EXPIRATION_HOURS }}"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
