name: Deploy - Development

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./src/BusinessAssistant.Api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: development

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEV_DEPLOY_PATH }}

            export DB_CONNECTION_STRING="${{ secrets.DEV_DB_CONNECTION_STRING }}"
            export REDIS_CONNECTION_STRING="${{ secrets.DEV_REDIS_CONNECTION_STRING }}"
            export REDIS_PASSWORD="${{ secrets.DEV_REDIS_PASSWORD }}"
            export POSTGRES_USER="${{ secrets.DEV_POSTGRES_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.DEV_POSTGRES_PASSWORD }}"
            export POSTGRES_DB="${{ secrets.DEV_POSTGRES_DB }}"
            export JWT_KEY="${{ secrets.DEV_JWT_KEY }}"
            export JWT_ISSUER="${{ secrets.DEV_JWT_ISSUER }}"
            export JWT_AUDIENCE="${{ secrets.DEV_JWT_AUDIENCE }}"
            export JWT_EXPIRATION_HOURS="${{ secrets.DEV_JWT_EXPIRATION_HOURS }}"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
